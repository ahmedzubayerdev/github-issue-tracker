<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker | issues</title>
     <!-- daisy ui and tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awsome  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- css  -->
     <link rel="stylesheet" href="./css/style.css">

</head>
<body>
    <!-- navbar -->
    <header>
        <nav class="flex justify-around gap-3 sm:px-10 py-4 ">
            <div class="flex items-center " >
                <img src="./assets/github-logo.png" class="w-10">
                <h1 class=" hidden md:block font-bold text-2xl visible"> Github Issues Tracker </h1>
            </div>
            <div class="text-right flex  items-center sm:text-left">
                <input type="text" placeholder="Search issue..." class="  md:h-11 w-2xs border-0 " >
                <button class="primary-btn text-xs sm:py-3 px-4">+ New Issue</button>
            </div>
        </nav>
    </header>

    <!-- main section  -->
    <main class="w-[90%] mx-auto ">
        <!-- tab section  -->
        <div class="tab-contanier mt-14 p-6 flex items-start gap-2">
            <button class="primary-btn px-3 py-2 w-28">All</button>
            <button class="px-3 py-2 w-28">Open</button>
            <button class="px-3 py-2 w-28">Closed</button>
        </div>

        <!-- issue count section  -->
        <div class="issue-count-continer flex justify-between items-center gap-4 p-4">
            <div class="flex items-center gap-2">
                <div>
                <img src="./assets/Aperture.png" alt="">
                </div>
                <div class="text-left ">
                <p class="font-semibold text-xl"><span id="issue-count">0</span> Issues</p>
                <p class="text-[#64748B]">Track and manage your project issues</p>
            </div>
            </div>
            
            <div class="flex items-center gap-3">
                <div>  
                <img src="./assets/green.png" alt="">
                </div>
                 <p>Open</p>
                <div>
                <img src="./assets/purple.png" alt="">
                </div>
                 <p>Closed</p>
            </div>
        </div>

        <section class="card-container ">
            <div id="allcards" class=" grid grid-cols-1 mx-auto sm:grid-cols-3 gap-3 ">
                
            </div>
        </section>

        <!-- loading spinner -->
        <div id="loading-spinner" class="h-[60vh] hidden justify-center items-center">
            <span class="loading loading-dots loading-xl"></span>
        </div>



        

    </main>
    <script src="./script.js"></script>
    <script src="./issues.js"></script>
</body>
</html>
